spring:
  application:
    name: coupon
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/coupon}
    username: ${DB_USERNAME:coupon}
    password: ${DB_PASSWORD:coupon}
  jpa:
    hibernate:
      # Flyway owns the schema; validate ensures the entity mapping matches it.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  tracing:
    sampling:
      # Sample every request in this task so traces are always present in logs.
      # In production this would be lowered and paired with an OTLP exporter.
      probability: 1.0

geoip:
  # Free, no-key IP geolocation. Country is resolved per request and cached per instance.
  base-url: ${GEOIP_BASE_URL:http://ip-api.com/json}
  timeout: ${GEOIP_TIMEOUT:PT2S}
  cache:
    maximum-size: 50000
    ttl: PT24H

logging:
  level:
    com.dawidniedzwiecki.coupon: INFO
