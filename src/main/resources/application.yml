spring:
  application:
    name: coupon
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/coupon}
    username: ${DB_USERNAME:coupon}
    password: ${DB_PASSWORD:coupon}
  jpa:
    hibernate:
      ddl-auto: validate  # Flyway owns the schema; validate only checks the mapping against it.
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  mvc:
    problemdetails:
      enabled: true  # framework errors (validation, unreadable body) also render as RFC 9457 ProblemDetail

geoip:
  # Bundled DB-IP Lite snapshot (CC-BY-4.0; see NOTICE). Set GEOIP_DATABASE_PATH to an external .mmdb.
  database-path: ${GEOIP_DATABASE_PATH:}
  # Set GEOIP_UPDATE_URL to auto-refresh the database on startup and on this cron; unset = bundled only.
  update-cron: ${GEOIP_UPDATE_CRON:0 0 3 * * *}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.dawidniedzwiecki.coupon: INFO
