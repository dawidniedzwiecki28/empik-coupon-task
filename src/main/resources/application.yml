spring:
  application:
    name: coupon
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/coupon}
    username: ${DB_USERNAME:coupon}
    password: ${DB_PASSWORD:coupon}
  jpa:
    hibernate:
      ddl-auto: validate  # Flyway owns the schema; validate only checks the mapping matches it.
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  mvc:
    problemdetails:
      enabled: true  # validation / not-readable errors return RFC 9457 ProblemDetail

geoip:
  # HTTPS so a spoofed response can't grant a country-restricted redemption.
  base-url: ${GEOIP_BASE_URL:https://ipapi.co}
  timeout: ${GEOIP_TIMEOUT:2s}
  cache:
    maximum-size: 50000
    ttl: 24h

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.dawidniedzwiecki.coupon: INFO
