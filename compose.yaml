services:
  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/coupon
      DB_USERNAME: coupon
      DB_PASSWORD: coupon
    ports:
      - "127.0.0.1:8080:8080"

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: coupon
      POSTGRES_USER: coupon
      POSTGRES_PASSWORD: coupon
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - coupon-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coupon -d coupon"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  coupon-pgdata:
