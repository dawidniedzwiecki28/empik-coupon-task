services:
  postgres:
    image: postgres:17-alpine
    container_name: coupon-postgres
    environment:
      POSTGRES_DB: coupon
      POSTGRES_USER: coupon
      POSTGRES_PASSWORD: coupon
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - coupon-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coupon -d coupon"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  coupon-pgdata:
