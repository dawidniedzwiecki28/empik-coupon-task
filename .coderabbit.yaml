# CodeRabbit configuration — tuned to this service's architecture and concurrency model.
# The path_instructions teach the reviewer our invariants so it reviews against them.
language: en-US
reviews:
  profile: assertive
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  auto_review:
    enabled: true
    base_branches:
      - main
  path_filters:
    - "!**/build/**"
    - "!**/gradle/wrapper/**"
    - "!gradlew"
    - "!gradlew.bat"
  path_instructions:
    - path: "**/core/**"
      instructions: >
        `core` is a self-contained module (api / domain / infrastructure). Its ONLY external
        boundary is `core.api` (the CouponOperations interface + DTOs) — that package must not
        expose JPA entities or import Spring Web. WITHIN the module, domain and infrastructure
        may use Spring Data repositories, @Service, @Transactional and JPA directly — that is the
        intended convention, not a violation. Expected redemption outcomes (CouponNotFound,
        LimitReached, CountryNotAllowed, AlreadyRedeemedByUser, Success) must be modelled as the
        sealed RedemptionResult and returned, NOT thrown. Flag business logic placed in the REST
        layer, or JPA entities leaking through core.api.
    - path: "**/rest/**"
      instructions: >
        REST edge only. Controllers depend on the core CouponOperations interface, never a
        concrete implementation. Map core.api DTOs (CouponView, RedemptionResult) to API/response
        models here; the core must not import REST/servlet types. Errors must use RFC 9457
        ProblemDetail via @RestControllerAdvice, never a 200 response carrying an error payload.
    - path: "**/infrastructure/**"
      instructions: >
        The module's infrastructure: Spring Data JpaRepository interfaces + entities, the
        transactional redemption executor, and outbound gateway interfaces (e.g. GeoIpResolver)
        alongside their adapters. Under this module convention, gateway port interfaces MAY live
        here next to their adapter — do not flag that. CONCURRENCY-CRITICAL: the usage limit must be an
        atomic conditional UPDATE (... WHERE current_uses < max_uses) acting on the affected
        row / returned row. FLAG any read-then-write or check-then-act on the counter, any
        in-memory / JVM lock (synchronized, ReentrantLock), and any use of COUNT(*) over
        redemptions to enforce the limit. Per-user uniqueness must be enforced by the
        UNIQUE(coupon_id, user_id) constraint (insert-and-catch-duplicate), not a
        SELECT-then-INSERT. The external geo-IP call must NOT happen inside the write
        transaction — flag any transaction held across the HTTP call.
    - path: "**/*Test*.*"
      instructions: >
        Tests must follow Arrange-Act-Assert, marked with `// given`, `// when`, `// then`
        comments; use `// expect` for simple single-expression cases where act and assert
        collapse into one statement (omit a section only when genuinely empty). Expect a concurrency test
        proving that exactly max_uses redemptions succeed under parallel load, and coverage of
        every RedemptionResult branch. Flag tests that assert on whole-table counts instead of
        scoped queries.
  tools:
    detekt:
      enabled: true
chat:
  auto_reply: true
